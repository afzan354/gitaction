apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

buildscript {
    apply from: '../CordovaLib/cordova.gradle'
    apply from: 'repositories.gradle'
    repositories repos

    dependencies {
        classpath "com.android.tools.build:gradle:${cordovaConfig.AGP_VERSION}"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${cordovaConfig.KOTLIN_VERSION}"
    }
}

allprojects {
    def hasRepositoriesGradle = file('repositories.gradle').exists()
    if (hasRepositoriesGradle) {
        apply from: 'repositories.gradle'
    } else {
        apply from: "${project.rootDir}/repositories.gradle"
    }
    repositories repos
}

task wrapper(type: Wrapper) {
    gradleVersion = cordovaConfig.GRADLE_VERSION
}

ext {
    apply from: '../CordovaLib/cordova.gradle'
    cdvVersionCode = project.hasProperty('cdvVersionCode') ? cdvVersionCode : null
    cdvBuildMultipleApks = project.hasProperty('cdvBuildMultipleApks') ? cdvBuildMultipleApks : null
    cdvVersionCodeForceAbiDigit = project.hasProperty('cdvVersionCodeForceAbiDigit') ? cdvVersionCodeForceAbiDigit : null
    cdvReleaseSigningPropertiesFile = project.hasProperty('cdvReleaseSigningPropertiesFile') ? cdvReleaseSigningPropertiesFile : null
    cdvDebugSigningPropertiesFile = project.hasProperty('cdvDebugSigningPropertiesFile') ? cdvDebugSigningPropertiesFile : null
    cdvBuildArch = project.hasProperty('cdvBuildArch') ? cdvBuildArch : null
    cdvPluginPostBuildExtras = []
}

def hasBuildExtras1 = file('build-extras.gradle').exists()
if (hasBuildExtras1) apply from: 'build-extras.gradle'

def hasBuildExtras2 = file('../build-extras.gradle').exists()
if (hasBuildExtras2) apply from: '../build-extras.gradle'

privateHelpers.applyCordovaConfigCustomization()

if (ext.cdvDebugSigningPropertiesFile == null && file('../debug-signing.properties').exists()) {
    ext.cdvDebugSigningPropertiesFile = '../debug-signing.properties'
}
if (ext.cdvReleaseSigningPropertiesFile == null && file('../release-signing.properties').exists()) {
    ext.cdvReleaseSigningPropertiesFile = '../release-signing.properties'
}

ext.cdvBuildMultipleApks = cdvBuildMultipleApks == null ? false : cdvBuildMultipleApks.toBoolean();
ext.cdvVersionCodeForceAbiDigit = cdvVersionCodeForceAbiDigit == null ? false : cdvVersionCodeForceAbiDigit.toBoolean();
ext.cdvVersionCode = cdvVersionCode == null ? null : Integer.parseInt('' + cdvVersionCode)

def computeBuildTargetName(debugBuild) {
    def ret = 'assemble'
    if (cdvBuildMultipleApks && cdvBuildArch) {
        def arch = cdvBuildArch == 'arm' ? 'armv7' : cdvBuildArch
        ret += '' + arch.toUpperCase().charAt(0) + arch.substring(1);
    }
    return ret + (debugBuild ? 'Debug' : 'Release')
}

task cdvBuildDebug
cdvBuildDebug.dependsOn { computeBuildTargetName(true) }

task cdvBuildRelease
cdvBuildRelease.dependsOn { computeBuildTargetName(false) }

android {
    namespace = cordovaConfig.PACKAGE_NAMESPACE
    buildFeatures { buildConfig = true }

    defaultConfig {
        versionCode cdvVersionCode ?: new BigInteger("" + privateHelpers.extractIntFromManifest("versionCode"))
        applicationId cordovaConfig.PACKAGE_NAMESPACE
        minSdkVersion cordovaConfig.MIN_SDK_VERSION
        if (cordovaConfig.MAX_SDK_VERSION != null) maxSdkVersion cordovaConfig.MAX_SDK_VERSION
        targetSdkVersion cordovaConfig.SDK_VERSION
        compileSdkVersion cordovaConfig.COMPILE_SDK_VERSION
    }

    lintOptions { abortOnError = false }
    buildToolsVersion cordovaConfig.BUILD_TOOLS_VERSION

    compileOptions {
        sourceCompatibility JavaLanguageVersion.of(cordovaConfig.JAVA_SOURCE_COMPATIBILITY)
        targetCompatibility JavaLanguageVersion.of(cordovaConfig.JAVA_TARGET_COMPATIBILITY)
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    if (cdvReleaseSigningPropertiesFile) {
        signingConfigs {
            release {
                keyAlias = ""
                keyPassword = ""
                storeFile = null
                storePassword = ""
            }
        }
        buildTypes {
            release { signingConfig signingConfigs.release }
        }
        addSigningProps(cdvReleaseSigningPropertiesFile, signingConfigs.release)
    }

    if (cdvDebugSigningPropertiesFile) {
        addSigningProps(cdvDebugSigningPropertiesFile, signingConfigs.debug)
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: '*.jar')
    implementation "androidx.appcompat:appcompat:${cordovaConfig.ANDROIDX_APP_COMPAT_VERSION}"
    implementation "androidx.core:core-splashscreen:${cordovaConfig.ANDROIDX_CORE_SPLASHSCREEN_VERSION}"

    // Library Kotlin utama
    implementation "org.jetbrains.kotlin:kotlin-stdlib:${cordovaConfig.KOTLIN_VERSION}"
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "org.jsoup:jsoup:1.17.2"

    implementation(project(path: ":CordovaLib"))
}

def addSigningProps(propsFilePath, signingConfig) {
    def propsFile = file(propsFilePath)
    def props = new Properties()
    propsFile.withReader { reader -> props.load(reader) }

    def storeFile = new File(props.get('key.store') ?: privateHelpers.ensureValueExists(propsFilePath, props, 'storeFile'))
    if (!storeFile.isAbsolute()) {
        storeFile = RelativePath.parse(true, storeFile.toString()).getFile(propsFile.getParentFile())
    }
    if (!storeFile.exists()) throw new FileNotFoundException('Keystore file does not exist: ' + storeFile.getAbsolutePath())
    
    signingConfig.keyAlias = props.get('key.alias') ?: privateHelpers.ensureValueExists(propsFilePath, props, 'keyAlias')
    signingConfig.keyPassword = props.get('keyPassword', props.get('key.alias.password', signingConfig.keyPassword))
    signingConfig.storeFile = storeFile
    signingConfig.storePassword = props.get('storePassword', props.get('key.store.password', signingConfig.storePassword))
    
    def storeType = props.get('storeType', props.get('key.store.type', ''))
    if (!storeType) {
        def filename = storeFile.getName().toLowerCase()
        if (filename.endsWith('.p12') || filename.endsWith('.pfx')) storeType = 'pkcs12'
        else storeType = signingConfig.storeType
    }
    signingConfig.storeType = storeType
}

for (def func : cdvPluginPostBuildExtras) { func() }
if (hasProperty('postBuildExtras')) postBuildExtras()
if (cordovaConfig.IS_GRADLE_PLUGIN_GOOGLE_SERVICES_ENABLED) apply plugin: 'com.google.gms.google-services'