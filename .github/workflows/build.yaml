name: Build Android APK Otomatis

on:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Pancing file gradlew dari folder kosong (Bypass Error 9.x)
        run: |
          mkdir temp_wrapper
          cd temp_wrapper
          # Buat file settings.gradle palsu agar Gradle 9 tidak protes
          echo "rootProject.name = 'temp'" > settings.gradle
          gradle wrapper --gradle-version 8.4
          cp -r gradle ../android/
          cp gradlew ../android/
          cp gradlew.bat ../android/

      - name: Beri izin eksekusi pada Gradle
        working-directory: ./android
        run: chmod +x ./gradlew

      - name: Build APK (Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Simpan APK agar bisa diunduh
        uses: actions/upload-artifact@v4
        with:
          name: aplikasi-zanhub-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
